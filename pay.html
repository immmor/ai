<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>以墨钱包 - 安全支付</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --bg-main: #0f172a;
            --bg-card: #1e293b;
            --bg-input: #334155;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --border: #475569;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg-main);
            font-family: 'Segoe UI', 'Microsoft YaHei', system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text-primary);
            padding: 20px;
        }

        @media (max-width: 480px) {
            body { padding: 0; }
        }

        .trust-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            color: var(--success);
            margin-bottom: 20px;
            padding: 8px 12px;
            background: rgba(16, 185, 129, 0.1);
            border-radius: 20px;
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        .trust-badge i { font-size: 13px; }

        .card {
            width: 100%;
            max-width: 420px;
            background: var(--bg-card);
            border-radius: 16px;
            padding: clamp(24px, 5vw, 40px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid var(--border);
            margin-top: 20px;
        }

        @media (max-width: 480px) {
            body { padding: 0; }
            .card {
                max-width: 100%;
                border-radius: 0;
                min-height: 100vh;
                margin-top: 0;
                padding: 20px 16px;
                display: flex;
                flex-direction: column;
                justify-content: center;
            }
        }

        .header {
            text-align: center;
            margin-bottom: 24px;
        }

        .header h1 {
            font-size: clamp(20px, 5vw, 26px);
            font-weight: 600;
            background: linear-gradient(135deg, var(--primary), #60a5fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 4px;
        }

        .header p {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .balance-section {
            background: linear-gradient(135deg, rgba(37, 99, 235, 0.15), rgba(96, 165, 250, 0.1));
            border: 1px solid rgba(37, 99, 235, 0.3);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 24px;
        }

        .balance-label {
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }

        .balance-value {
            font-size: clamp(28px, 7vw, 36px);
            font-weight: 700;
            color: var(--text-primary);
        }

        .balance-value::before {
            content: '¥';
            font-size: 0.6em;
            opacity: 0.7;
        }

        .section-title {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .amount-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .amount-btn {
            background: var(--bg-input);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 14px 8px;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .amount-btn:hover {
            border-color: var(--primary);
            background: rgba(37, 99, 235, 0.1);
        }

        .amount-btn.active {
            background: var(--primary);
            border-color: var(--primary);
            color: white;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.4);
        }

        .custom-amount {
            display: none;
            margin-bottom: 20px;
        }

        .custom-amount.show { display: block; }

        .custom-amount input {
            width: 100%;
            background: var(--bg-input);
            border: 1px solid var(--primary);
            color: var(--text-primary);
            padding: 14px;
            border-radius: 10px;
            font-size: 16px;
            outline: none;
        }

        .custom-amount input::placeholder { color: var(--text-secondary); }

        .pay-methods {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 24px;
        }

        .pay-method {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 14px;
            background: var(--bg-input);
            border: 2px solid transparent;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .pay-method:hover { border-color: var(--border); }

        .pay-method.active {
            border-color: var(--primary);
            background: rgba(37, 99, 235, 0.1);
        }

        .pay-method i {
            font-size: 20px;
            width: 24px;
            text-align: center;
        }

        .pay-method .fa-alipay { color: #1677ff; }
        .pay-method .fa-weixin { color: #07c160; }
        .pay-method .fa-bitcoin { color: #f7931a; }
        .pay-method .fa-credit-card { color: #f59e0b; }

        .pay-method-info { flex: 1; }
        .pay-method-name { font-size: 14px; font-weight: 600; }
        .pay-method-desc { font-size: 11px; color: var(--text-secondary); }

        .submit-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 15px rgba(37, 99, 235, 0.3);
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(37, 99, 235, 0.4);
        }

        .submit-btn:active { transform: translateY(0); }

        .submit-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .secure-footer {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 6px;
            margin-top: 20px;
            font-size: 11px;
            color: var(--text-secondary);
        }

        .secure-footer i { color: var(--success); }

        /* 登录/注册表单 */
        .auth-form {
            display: none;
        }

        .auth-form.active { display: block; }

        .input-group {
            margin-bottom: 16px;
        }

        .input-group input {
            width: 100%;
            background: var(--bg-input);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 14px;
            border-radius: 10px;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
        }

        .input-group input:focus { border-color: var(--primary); }
        .input-group input::placeholder { color: var(--text-secondary); }

        .auth-hint {
            text-align: center;
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 16px;
        }

        .auth-buttons {
            display: flex;
            gap: 10px;
        }

        .auth-btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .auth-btn.primary {
            background: var(--primary);
            color: white;
        }

        .auth-btn.secondary {
            background: var(--bg-input);
            color: var(--text-primary);
            border: 1px solid var(--border);
        }

        .auth-btn:hover { opacity: 0.9; transform: translateY(-1px); }

        /* 导航 */
        .nav-tabs {
            display: flex;
            gap: 4px;
            margin-bottom: 20px;
            background: var(--bg-input);
            padding: 4px;
            border-radius: 10px;
        }

        .nav-tab {
            flex: 1;
            padding: 10px;
            background: transparent;
            border: none;
            color: var(--text-secondary);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.2s;
        }

        .nav-tab.active {
            background: var(--primary);
            color: white;
        }

        /* 用户菜单 */
        .user-section {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .user-avatar {
            width: 36px;
            height: 36px;
            background: var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 14px;
        }

        .user-name {
            font-size: 14px;
            font-weight: 600;
        }

        .logout-btn {
            padding: 8px 14px;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--danger);
            font-size: 12px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .logout-btn:hover {
            background: rgba(239, 68, 68, 0.1);
            border-color: var(--danger);
        }

        /* 订单列表 */
        .orders-section { display: none; }

        .orders-section.active { display: block; }

        .orders-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .stat-item {
            background: var(--bg-input);
            padding: 12px;
            border-radius: 10px;
            text-align: center;
        }

        .stat-value {
            font-size: 20px;
            font-weight: 700;
            color: var(--primary);
        }

        .stat-label {
            font-size: 11px;
            color: var(--text-secondary);
            margin-top: 2px;
        }

        .orders-list {
            max-height: 400px;
            overflow-y: auto;
            margin: 0 -4px;
            padding: 0 4px;
        }

        .order-item {
            background: var(--bg-input);
            border-radius: 10px;
            padding: 14px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .order-item:hover {
            border: 1px solid var(--primary);
            margin: -1px;
            margin-bottom: 9px;
        }

        .order-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .order-no {
            font-size: 12px;
            color: var(--text-secondary);
            font-family: monospace;
        }

        .order-amount {
            font-size: 16px;
            font-weight: 700;
        }

        .order-meta {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: var(--text-secondary);
        }

        .order-status {
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 600;
        }

        .status-pending { background: rgba(245, 158, 11, 0.2); color: var(--warning); }
        .status-paid { background: rgba(16, 185, 129, 0.2); color: var(--success); }
        .status-failed { background: rgba(239, 68, 68, 0.2); color: var(--danger); }

        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            margin-top: 16px;
        }

        .page-btn {
            padding: 8px 16px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            color: var(--text-primary);
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .page-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .page-btn:not(:disabled):hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        .page-info {
            font-size: 12px;
            color: var(--text-secondary);
        }

        /* 信用卡固定金额提示 */
        .credit-card-fixed {
            display: none;
            text-align: center;
            padding: 20px;
            background: linear-gradient(135deg, rgba(245, 158, 11, 0.15), rgba(245, 158, 11, 0.05));
            border: 1px solid rgba(245, 158, 11, 0.3);
            border-radius: 12px;
            margin-bottom: 20px;
        }

        .credit-card-fixed.show { display: block; }

        .credit-card-fixed .amount {
            font-size: 32px;
            font-weight: 700;
            color: var(--warning);
        }

        .credit-card-fixed .note {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        /* 支付二维码弹窗 */
        .qr-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;
        }

        .qr-overlay.show { display: flex; }

        .qr-modal {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 24px;
            max-width: 340px;
            width: 100%;
            text-align: center;
        }

        .qr-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 16px;
            color: var(--primary);
        }

        .qr-order-no {
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .qr-order-value {
            background: var(--bg-input);
            padding: 8px 12px;
            border-radius: 6px;
            font-family: monospace;
            font-size: 12px;
            margin-bottom: 12px;
            word-break: break-all;
        }

        .qr-amount {
            font-size: 24px;
            font-weight: 700;
            color: var(--success);
            margin-bottom: 16px;
        }

        .qr-image {
            width: 200px;
            height: 200px;
            border-radius: 12px;
            margin: 0 auto 16px;
            background: white;
            padding: 10px;
        }

        .qr-image img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .qr-instructions {
            font-size: 12px;
            color: var(--text-secondary);
            text-align: left;
            line-height: 1.6;
            margin-bottom: 16px;
        }

        .qr-instructions strong { color: var(--danger); }

        .qr-close {
            width: 100%;
            padding: 12px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            color: var(--text-primary);
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .qr-close:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        /* 隐藏默认表单 */
        #login-form, #register-form, #pay-interface, #orders-interface {
            display: none !important;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="trust-badge">
            <i class="fas fa-shield-halved"></i>
            <span>安全支付 · 加密连接</span>
        </div>

        <div class="header">
            <h1>以墨钱包</h1>
            <p>快捷、安全的在线充值服务</p>
        </div>

        <!-- 未登录状态 -->
        <div id="auth-section" class="auth-form active">
            <div class="input-group">
                <input type="text" id="username" placeholder="请输入用户名">
            </div>
            <div class="input-group">
                <input type="password" id="password" placeholder="请输入密码">
            </div>
            <p class="auth-hint">已有账号可直接登录，无需重复注册</p>
            <div class="auth-buttons">
                <button class="auth-btn primary" onclick="login()">登录</button>
                <button class="auth-btn secondary" onclick="showRegister()">注册</button>
            </div>
        </div>

        <!-- 注册表单 -->
        <div id="reg-section" class="auth-form">
            <div class="input-group">
                <input type="text" id="reg-username" placeholder="设置用户名">
            </div>
            <div class="input-group">
                <input type="password" id="reg-password" placeholder="设置密码">
            </div>
            <div class="input-group">
                <input type="password" id="reg-confirm" placeholder="确认密码">
            </div>
            <p class="auth-hint">已有账号可直接登录</p>
            <div class="auth-buttons">
                <button class="auth-btn primary" onclick="register()">确认注册</button>
                <button class="auth-btn secondary" onclick="showLogin()">返回登录</button>
            </div>
        </div>

        <!-- 已登录状态 -->
        <div id="main-section" style="display: none;">
            <div class="user-section">
                <div class="user-info">
                    <div class="user-avatar" id="user-avatar">U</div>
                    <span class="user-name" id="user-name">用户名</span>
                </div>
                <button class="logout-btn" onclick="logout()">退出</button>
            </div>

            <div class="nav-tabs">
                <button class="nav-tab active" onclick="switchTab('pay')">充值</button>
                <button class="nav-tab" onclick="switchTab('orders')">订单</button>
            </div>

            <!-- 充值界面 -->
            <div id="pay-view">
                <div class="balance-section">
                    <div class="balance-label">可用余额</div>
                    <div class="balance-value" id="balance">0.00</div>
                </div>

                <div class="section-title">选择充值金额</div>
                <div class="amount-grid" id="amount-grid">
                    <button class="amount-btn" onclick="selectAmount(10)">¥10</button>
                    <button class="amount-btn" onclick="selectAmount(20)">¥20</button>
                    <button class="amount-btn" onclick="selectAmount(50)">¥50</button>
                    <button class="amount-btn" onclick="selectAmount(100)">¥100</button>
                    <button class="amount-btn" onclick="selectAmount(200)">¥200</button>
                    <button class="amount-btn" onclick="showCustom()">自定义</button>
                </div>

                <div class="custom-amount" id="custom-amount">
                    <input type="number" id="custom-input" placeholder="请输入金额（最低10元）" min="10">
                </div>

                <div class="credit-card-fixed" id="credit-fixed">
                    <div class="amount">¥140</div>
                    <div class="note">美元汇率折算（$20 USD）</div>
                </div>

                <div class="section-title">选择支付方式</div>
                <div class="pay-methods" id="pay-methods">
                    <div class="pay-method active" data-value="alipay" onclick="selectPayMethod('alipay')">
                        <i class="fab fa-alipay"></i>
                        <div class="pay-method-info">
                            <div class="pay-method-name">支付宝</div>
                            <div class="pay-method-desc">即时到账</div>
                        </div>
                    </div>
                    <div class="pay-method" data-value="wechat" onclick="selectPayMethod('wechat')">
                        <i class="fab fa-weixin"></i>
                        <div class="pay-method-info">
                            <div class="pay-method-name">微信支付</div>
                            <div class="pay-method-desc">即时到账</div>
                        </div>
                    </div>
                    <div class="pay-method" data-value="alipay_static" onclick="selectPayMethod('alipay_static')">
                        <i class="fab fa-alipay"></i>
                        <div class="pay-method-info">
                            <div class="pay-method-name">支付宝</div>
                            <div class="pay-method-desc">人工审核</div>
                        </div>
                    </div>
                    <div class="pay-method" data-value="wechat_static" onclick="selectPayMethod('wechat_static')">
                        <i class="fab fa-weixin"></i>
                        <div class="pay-method-info">
                            <div class="pay-method-name">微信支付</div>
                            <div class="pay-method-desc">人工审核</div>
                        </div>
                    </div>
                    <div class="pay-method" data-value="usdt" onclick="selectPayMethod('usdt')">
                        <i class="fab fa-bitcoin"></i>
                        <div class="pay-method-info">
                            <div class="pay-method-name">USDT</div>
                            <div class="pay-method-desc">TRON网络</div>
                        </div>
                    </div>
                    <div class="pay-method" data-value="credit_card" onclick="selectPayMethod('credit_card')">
                        <i class="fas fa-credit-card"></i>
                        <div class="pay-method-info">
                            <div class="pay-method-name">信用卡</div>
                            <div class="pay-method-desc">固定$20</div>
                        </div>
                    </div>
                </div>

                <button class="submit-btn" id="pay-btn" onclick="pay()">
                    立即充值
                </button>
            </div>

            <!-- 订单界面 -->
            <div id="orders-view" class="orders-section">
                <div class="orders-stats">
                    <div class="stat-item">
                        <div class="stat-value" id="total-count">0</div>
                        <div class="stat-label">总订单</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="paid-count">0</div>
                        <div class="stat-label">已完成</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="pending-count">0</div>
                        <div class="stat-label">待支付</div>
                    </div>
                </div>

                <div class="orders-list" id="orders-list">
                    <div style="text-align: center; padding: 30px; color: var(--text-secondary);">
                        暂无订单记录
                    </div>
                </div>

                <div class="pagination">
                    <button class="page-btn" id="prev-btn" onclick="changePage(-1)" disabled>上一页</button>
                    <span class="page-info" id="page-info">第 1/1 页</span>
                    <button class="page-btn" id="next-btn" onclick="changePage(1)" disabled>下一页</button>
                </div>
            </div>
        </div>

        <div class="secure-footer">
            <i class="fas fa-lock"></i>
            <span>SSL加密保护 · 隐私安全</span>
        </div>
    </div>

    <!-- 二维码弹窗 -->
    <div class="qr-overlay" id="qr-overlay">
        <div class="qr-modal">
            <div class="qr-title" id="qr-title">支付宝支付</div>
            <div class="qr-order-no">订单号</div>
            <div class="qr-order-value" id="qr-order-no">-</div>
            <div class="qr-amount" id="qr-amount">¥0.00</div>
            <div class="qr-image">
                <img id="qr-image" src="" alt="支付二维码">
            </div>
            <div class="qr-instructions" id="qr-instructions">
                请使用支付宝扫描上方二维码<br>
                支付时<strong>请务必备注订单号</strong>
            </div>
            <button class="qr-close" onclick="closeQR()">关闭</button>
        </div>
    </div>

    <script>
        let currentUser = null;
        let selectedAmount = null;
        let selectedMethod = 'alipay';
        let currentPage = 1;
        let totalPages = 1;

        const urlParams = new URLSearchParams(window.location.search);
        const urlUsername = urlParams.get('username');
        if (urlUsername) document.getElementById('username').value = urlUsername;

        currentUser = JSON.parse(localStorage.getItem('currentUser'));
        if (currentUser) {
            showMainInterface();
            updateBalance();
        }

        function showMainInterface() {
            document.getElementById('auth-section').classList.remove('active');
            document.getElementById('reg-section').classList.remove('active');
            document.getElementById('main-section').style.display = 'block';
            document.getElementById('user-name').textContent = currentUser.username.slice(0, 8) + (currentUser.username.length > 8 ? '*' : '');
            document.getElementById('user-avatar').textContent = currentUser.username.charAt(0).toUpperCase();
        }

        function showRegister() {
            document.getElementById('auth-section').classList.remove('active');
            document.getElementById('reg-section').classList.add('active');
        }

        function showLogin() {
            document.getElementById('reg-section').classList.remove('active');
            document.getElementById('auth-section').classList.add('active');
        }

        async function login() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            if (!username || !password) return alert('请输入用户名和密码');

            try {
                const data = await fetch('https://immmor.com/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                }).then(r => r.json());

                if (data.success) {
                    localStorage.setItem('currentUser', JSON.stringify(data.userInfo));
                    location.reload();
                } else {
                    alert(data.message || '登录失败');
                }
            } catch (e) {
                alert('网络错误，请稍后重试');
            }
        }

        async function register() {
            const username = document.getElementById('reg-username').value.trim();
            const password = document.getElementById('reg-password').value;
            const confirm = document.getElementById('reg-confirm').value;

            if (!username || !password) return alert('请填写完整信息');
            if (password !== confirm) return alert('两次密码不一致');

            try {
                const data = await fetch('https://immmor.com/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                }).then(r => r.json());

                if (data.success) {
                    alert('注册成功，请登录');
                    showLogin();
                    document.getElementById('username').value = username;
                    document.getElementById('reg-username').value = '';
                    document.getElementById('reg-password').value = '';
                    document.getElementById('reg-confirm').value = '';
                } else {
                    alert(data.message || '注册失败');
                }
            } catch (e) {
                alert('网络错误，请稍后重试');
            }
        }

        async function updateBalance() {
            if (!currentUser) return;
            try {
                const data = await fetch(`https://immmor.com/api/balance?username=${currentUser.username}`).then(r => r.json());
                if (data.code === 200) {
                    document.getElementById('balance').textContent = parseFloat(data.balance).toFixed(2);
                }
            } catch (e) {
                console.error('余额查询失败');
            }
        }

        function selectAmount(amount) {
            if (selectedMethod === 'credit_card') return;
            selectedAmount = amount;
            document.querySelectorAll('.amount-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('custom-amount').classList.remove('show');
        }

        function showCustom() {
            if (selectedMethod === 'credit_card') return;
            selectedAmount = null;
            document.querySelectorAll('.amount-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('custom-amount').classList.add('show');
            document.getElementById('custom-input').focus();
        }

        function selectPayMethod(method) {
            selectedMethod = method;
            document.querySelectorAll('.pay-method').forEach(m => m.classList.remove('active'));
            document.querySelector(`.pay-method[data-value="${method}"]`).classList.add('active');

            const amountGrid = document.getElementById('amount-grid');
            const creditFixed = document.getElementById('credit-fixed');
            const customAmount = document.getElementById('custom-amount');

            if (method === 'credit_card') {
                amountGrid.style.display = 'none';
                creditFixed.classList.add('show');
                customAmount.classList.remove('show');
                selectedAmount = 140;
            } else {
                amountGrid.style.display = 'grid';
                creditFixed.classList.remove('show');
                selectedAmount = null;
            }
        }

        async function pay() {
            let amount = selectedAmount;
            if (!amount) {
                amount = document.getElementById('custom-input').value;
            }

            if (!amount || amount < 10) return alert('最低充值10元');

            const orderNo = currentUser.username + '_' + Date.now();

            if (['wechat_static', 'alipay_static'].includes(selectedMethod)) {
                showStaticQR(orderNo, amount);
                return;
            }

            if (selectedMethod === 'usdt') {
                showUSDTInfo(amount, orderNo);
                return;
            }

            if (selectedMethod === 'credit_card') {
                showCreditCardInfo();
                return;
            }

            try {
                const data = await fetch('https://immmor.com/api/pay/build-url', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        type: selectedMethod,
                        order_no: orderNo,
                        amount: parseFloat(amount),
                        description: '以墨钱包充值',
                        username: currentUser.username
                    })
                }).then(r => r.json());

                if (data.code === 200) {
                    window.location.href = data.data.pay_url;
                } else {
                    alert(data.msg || '支付发起失败');
                }
            } catch (e) {
                alert('网络错误，请稍后重试');
            }
        }

        function showStaticQR(orderNo, amount) {
            const isAlipay = selectedMethod === 'alipay_static';
            document.getElementById('qr-title').textContent = isAlipay ? '支付宝支付' : '微信支付';
            document.getElementById('qr-order-no').textContent = orderNo;
            document.getElementById('qr-amount').textContent = `¥${amount}`;
            document.getElementById('qr-image').src = isAlipay ? 'static/pay/zfb.jpg' : 'static/pay/weixin.jpg';
            document.getElementById('qr-instructions').innerHTML = `
                请使用${isAlipay ? '支付宝' : '微信'}扫描上方二维码<br>
                支付时<strong>请务必备注订单号</strong>，否则无法到账
            `;
            document.getElementById('qr-overlay').classList.add('show');
            document.body.style.overflow = 'hidden';
        }

        function showUSDTInfo(amount, orderNo) {
            alert(`USDT充值\n订单号: ${orderNo}\n金额: ¥${amount}\n\n请联系客服获取USDT收款地址`);
        }

        function showCreditCardInfo() {
            alert('信用卡支付\n固定金额: ¥140 ($20 USD)\n\n请联系客服完成支付');
        }

        function closeQR() {
            document.getElementById('qr-overlay').classList.remove('show');
            document.body.style.overflow = '';
        }

        function switchTab(tab) {
            document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');

            document.getElementById('pay-view').style.display = tab === 'pay' ? 'block' : 'none';
            document.getElementById('orders-view').classList.toggle('active', tab === 'orders');

            if (tab === 'orders') loadOrders();
        }

        async function loadOrders() {
            if (!currentUser) return;
            try {
                const data = await fetch(`https://immmor.com/api/orders?username=${currentUser.username}&page=${currentPage}&limit=5`).then(r => r.json());
                if (data.code === 200) {
                    displayOrders(data.data.orders, data.data.pagination);
                }
            } catch (e) {
                document.getElementById('orders-list').innerHTML = '<div style="text-align: center; padding: 30px; color: var(--danger);">加载失败</div>';
            }
        }

        function displayOrders(orders, pagination) {
            const list = document.getElementById('orders-list');
            document.getElementById('total-count').textContent = pagination.total;
            totalPages = pagination.pages;

            if (!orders || orders.length === 0) {
                list.innerHTML = '<div style="text-align: center; padding: 30px; color: var(--text-secondary);">暂无订单记录</div>';
                updatePagination();
                return;
            }

            let paid = 0, pending = 0;
            list.innerHTML = orders.map(o => {
                if (o.status === 'paid') paid++;
                if (o.status === 'pending') pending++;

                const statusMap = { pending: '待支付', paid: '已完成', failed: '已失败' };
                const typeMap = { alipay: '支付宝', wxpay: '微信', usdt: 'USDT', wechat_static: '微信(人工)', alipay_static: '支付宝(人工)' };

                return `
                    <div class="order-item" onclick="copyOrderNo('${o.order_no}')">
                        <div class="order-header">
                            <div class="order-no">${o.order_no.slice(0, 16)}...</div>
                            <div class="order-amount">¥${parseFloat(o.amount).toFixed(2)}</div>
                        </div>
                        <div class="order-meta">
                            <span>${typeMap[o.payment_type] || o.payment_type}</span>
                            <span class="order-status status-${o.status}">${statusMap[o.status] || o.status}</span>
                        </div>
                    </div>
                `;
            }).join('');

            document.getElementById('paid-count').textContent = paid;
            document.getElementById('pending-count').textContent = pending;
            updatePagination();
        }

        function copyOrderNo(no) {
            navigator.clipboard.writeText(no).then(() => alert('订单号已复制: ' + no));
        }

        function updatePagination() {
            document.getElementById('page-info').textContent = `第 ${currentPage}/${totalPages} 页`;
            document.getElementById('prev-btn').disabled = currentPage <= 1;
            document.getElementById('next-btn').disabled = currentPage >= totalPages;
        }

        function changePage(delta) {
            const newPage = currentPage + delta;
            if (newPage >= 1 && newPage <= totalPages) {
                currentPage = newPage;
                loadOrders();
            }
        }

        function logout() {
            localStorage.removeItem('currentUser');
            location.reload();
        }

        document.addEventListener('click', e => {
            if (e.target.classList.contains('qr-overlay')) closeQR();
        });

        setInterval(() => {
            if (document.getElementById('orders-view').classList.contains('active')) {
                loadOrders();
            }
        }, 30000);
    </script>
</body>
</html>
