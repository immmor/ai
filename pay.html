        async function checkUSDTOrder(orderId) {
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 10000);
            
            try {
                const response = await fetch(`https://tronusdt.xyz/?way=paycheck&oid=${orderId}`, {
                    method: 'GET',
                    signal: controller.signal
                });
                
                if (!response.ok) {
                    throw new Error('Network response was not ok');
                }
                
                const data = await response.json();
                clearTimeout(timeoutId);
                console.log('Payment check result:', data);
                
                if (data.code === 1) {
                    const orderInfo = localStorage.getItem('usdtOrder_' + orderId);
                    if (orderInfo) {
                        const { username, rmbAmount, order_no } = JSON.parse(orderInfo);
                        await confirmUSDTRecharge(orderId, username, rmbAmount, order_no);
                    } else {
                        alert(t('usdt.paySuccessNoOrder'));
                    }
                    
                    const qrContainer = document.querySelector('[style*="z-index: 9999"]');
                    if (qrContainer) {
                        document.body.removeChild(qrContainer.previousElementSibling);
                        document.body.removeChild(qrContainer);
                        document.body.style.overflow = '';
                    }
                    
                    localStorage.removeItem('usdtOrder_' + orderId);
                } else {
                    alert(t('usdt.payPending'));
                }
            } catch (error) {
                clearTimeout(timeoutId);
                if (error.name === 'AbortError') {
                    alert(t('usdt.timeout'));
                } else {
                    alert(t('usdt.networkError'));
                }
            }
        }
        
        async function confirmUSDTRecharge(orderId, username, rmbAmount, orderNo) {
            try {
                const response = await fetch('https://immmor.com/api/recharge/confirm', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: username,
                        order_no: orderNo,
                        amount: parseFloat(rmbAmount),
                        payment_type: 'usdt'
                    })
                });
                
                const result = await response.json();
                if (result.success) {
                    alert(t('usdt.paySuccess'));
                    await updateBalance();
                } else {
                    alert(t('usdt.confirmFailed', { message: result.message }));
                }
            } catch (error) {
                console.error('Confirm recharge failed:', error);
                alert(t('usdt.confirmFailedContact'));
            }
        }
        
        // 订单簿功能
        function switchTab(tab) {
            document.querySelectorAll('.nav-tab').forEach(btn => btn.classList.remove('active'));
            document.getElementById('pay-interface').style.display = 'none';
            document.getElementById('orders-interface').style.display = 'none';
            
            if (tab === 'pay') {
                document.getElementById('pay-tab').classList.add('active');
                document.getElementById('pay-interface').style.display = 'block';
            } else {
                document.getElementById('orders-tab').classList.add('active');
                document.getElementById('orders-interface').style.display = 'block';
                loadOrders();
            }
        }
        
        async function loadOrders() {
            if (!currentUser) return;
            
            const statusFilter = document.getElementById('status-filter').value;
            const typeFilter = document.getElementById('type-filter').value;
            
            try {
                const ordersData = await (await fetch(`https://immmor.com/api/orders?username=${currentUser.username}&page=${currentPage}&limit=5`)).json();
                
                if (ordersData.code === 200) {
                    displayOrders(ordersData.data.orders, ordersData.data.pagination);
                } else {
                    alert(t('usdt.loadOrdersFailed', { message: ordersData.msg }));
                }
            } catch (error) {
                console.error('Load orders failed:', error);
                document.getElementById('orders-list').innerHTML = `<div style="text-align: center; padding: 20px; color: #ff4757;">${t('usdt.loadOrdersFailedRetry')}</div>`;
            }
        }
        
        function displayOrders(orders, pagination) {
            const ordersList = document.getElementById('orders-list');
            const totalOrders = document.getElementById('total-orders');
            
            totalOrders.textContent = pagination.total;
            totalPages = pagination.pages;
            if (orders.length === 0) {
                ordersList.innerHTML = `<div style="text-align: center; padding: 20px; color: #666;">${t('usdt.noOrders')}</div>`;
                updatePagination();
                return;
            }
            
            let html = '';
            orders.forEach(order => {
                const statusClass = `status-${order.status}`;
                const statusText = {
                    'pending': t('orders.pending'),
                    'paid': t('orders.paid'),
                    'failed': t('orders.failed')
                }[order.status] || order.status;
                
                const typeText = {
                    'alipay': t('orders.alipay'),
                    'wxpay': t('orders.wxpay'),
                    'usdt': 'USDT',
                    'wechat_static': t('orders.wxpay') + '(Manual)',
                    'alipay_static': t('orders.alipay') + '(Manual)'
                }[order.payment_type] || order.payment_type;
                
                html += `
                    <div class="order-item" onclick="prompt('Order No:', '${order.order_no}')">
                        <div class="order-header">
                            <div class="order-no">${order.order_no.slice(0, 15)}${order.order_no.length > 15 ? '*' : ''}</div>
                            <div class="order-amount">¥${parseFloat(order.amount).toFixed(2)}</div>
                        </div>
                        <div class="order-details">
                            <div><strong>${t('orders.payMethod') || 'Pay Method'}:</strong> ${typeText}</div>
                            <div><strong>${t('orders.status') || 'Status'}:</strong> <span class="order-status ${statusClass}">${statusText}</span></div>
                            <div><strong>${t('orders.createdAt') || 'Created'}:</strong> ${formatDate(order.created_at)}</div>
                            <div><strong>${t('orders.paidAt') || 'Paid At'}:</strong> ${order.paid_at ? formatDate(order.paid_at) : '-'}</div>
                        </div>
                    </div>
                `;
            });
            
            ordersList.innerHTML = html;
            updatePagination();
        }
        
        function updatePagination() {
            document.getElementById('page-info').textContent = t('orders.pageInfo', { current: currentPage, total: totalPages });
            document.getElementById('prev-page').disabled = currentPage <= 1;
            document.getElementById('next-page').disabled = currentPage >= totalPages;
        }
        
        function changePage(delta) {
            const newPage = currentPage + delta;
            if (newPage >= 1 && newPage <= totalPages) {
                currentPage = newPage;
                loadOrders();
            }
        }
        
        function formatDate(dateString) {
            if (!dateString) return '-';
            const date = new Date(new Date(dateString).getTime() + 8 * 60 * 60 * 1000);
            return date.toLocaleString('zh-CN');
        }
        
        function toggleDropdown() {
            document.getElementById('user-dropdown-menu').classList.toggle('show');
        }

        function toggleLangDropdown() {
            document.getElementById('lang-dropdown-menu').classList.toggle('show');
        }

        function setLanguage(lang) {
            currentLang = lang;
            localStorage.setItem('lang', currentLang);
            loadTranslations().then(() => {
                applyTranslations();
                updateDynamicText();
            });
            document.getElementById('lang-dropdown-menu').classList.remove('show');
        }

        document.addEventListener('click', function(e) {
            if (!e.target.closest('.user-dropdown')) {
                document.getElementById('user-dropdown-menu').classList.remove('show');
            }
            if (!e.target.closest('#lang-dropdown')) {
                document.getElementById('lang-dropdown-menu').classList.remove('show');
            }
        });

        function copyOrderNo() {
            const btn = document.getElementById('copyBtn');
            navigator.clipboard.writeText(document.getElementById('orderNoValue').textContent).then(() => {
                btn.textContent = t('staticPay.copied');
                setTimeout(() => btn.textContent = t('staticPay.copy'), 2000);
            });
        }

        async function showComplaint() {
            const content = prompt(t('usdt.complaintPrompt'));
            if (!content) return;
            try {
                const res = await fetch('https://api.immmor.com/api/send-message', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({content, target: 'single', username: 'immmor'})
                });
                const data = await res.json();
                alert(data.code === 200 ? t('usdt.complaintSubmit') : t('usdt.complaintFailed', { msg: data.msg }));
            } catch {
                alert(t('usdt.networkError'));
            }
        }

        function logout() {
            localStorage.removeItem('currentUser');
            localStorage.removeItem('phantomWallet');
            localStorage.removeItem('walletType');
            location.reload();
        }
        
        // 自动刷新订单列表（每30秒）
        setInterval(() => {
            if (document.getElementById('orders-interface').style.display !== 'none') {
                loadOrders();
            }
        }, 30000);
    </script>
