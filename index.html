    <style type="text/tailwindcss">
        @layer utilities {
            /* 枫树容器样式 */
            #maple-tree-container {
                pointer-events: none;
                transition: all 0.3s ease;
            }
            
            #maple-tree-canvas {
                background-color: transparent;
            }
            .code-blank {
                @apply bg-blue-50 border-b-2 border-primary px-1 mx-0.5 min-w-[30px] inline-block;
            }
            .code-blank.correct {
                @apply bg-green-50 border-b-2 border-success;
            }
            .option-hover {
                @apply hover:bg-gray-50 transition-colors;
            }
            
            /* 动画效果 */
            .animate-pulse-slow {
                animation: pulse 2s infinite;
            }
            .animate-float {
                animation: float 3s ease-in-out infinite;
            }
            
            @keyframes float {
                0%, 100% { transform: translateY(0px); }
                50% { transform: translateY(-10px); }
            }
            
            /* 游戏化动画 */
            .animate-glow {
                animation: glow 2s ease-in-out infinite alternate;
            }
            .animate-fireworks {
                animation: fireworks 2s ease-out forwards;
            }
            
            @keyframes glow {
                from { box-shadow: 0 0 5px #ff6b35, 0 0 10px #ff8e53, 0 0 15px #ffb142; }
                to { box-shadow: 0 0 10px #ff6b35, 0 0 20px #ff8e53, 0 0 30px #ffb142; }
            }
            
            @keyframes fireworks {
                0% { transform: scale(0); opacity: 1; }
                50% { transform: scale(1.2); opacity: 0.8; }
                100% { transform: scale(1); opacity: 0; }
            }
            
            /* 经验值获得动画 */
            .animate-bounce-in {
                animation: bounceIn 0.5s ease-out;
            }
            
            @keyframes bounceIn {
                0% { 
                    transform: scale(0.3) translateY(20px); 
                    opacity: 0; 
                }
                50% { 
                    transform: scale(1.1) translateY(-5px); 
                    opacity: 1; 
                }
                100% { 
                    transform: scale(1) translateY(0); 
                    opacity: 1; 
                }
            }
            
            /* 彩带动画 */
            @keyframes confetti {
                0% {
                    transform: translateY(0) rotate(0deg);
                    opacity: 1;
                }
                100% {
                    transform: translateY(100vh) rotate(360deg);
                    opacity: 0;
                }
            }
            
            /* 烟花爆炸动画 */
            @keyframes fireworks {
                0% {
                    transform: scale(0);
                    opacity: 1;
                }
                50% {
                    transform: scale(1.5);
                    opacity: 0.8;
                }
                100% {
                    transform: scale(2);
                    opacity: 0;
                }
            }
            
            /* 红叉动画样式 */
            .animate-red-x {
                animation: redXEffect 1.5s ease-out forwards;
            }
            
            @keyframes redXEffect {
                0% {
                    transform: scale(0) rotate(0deg);
                    opacity: 0;
                }
                20% {
                    transform: scale(1.2) rotate(-10deg);
                    opacity: 1;
                }
                40% {
                    transform: scale(1) rotate(10deg);
                    opacity: 1;
                }
                60% {
                    transform: scale(1.1) rotate(-5deg);
                    opacity: 1;
                }
                80% {
                    transform: scale(1) rotate(5deg);
                    opacity: 1;
                }
                100% {
                    transform: scale(1.2) rotate(0deg);
                    opacity: 0;
                }
            }
            
            .animate-red-x-pulse {
                animation: redXPulse 0.6s ease-out;
            }
            
            @keyframes redXPulse {
                0% {
                    transform: scale(1);
                    box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7);
                }
                70% {
                    transform: scale(1.05);
                    box-shadow: 0 0 0 10px rgba(239, 68, 68, 0);
                }
                100% {
                    transform: scale(1);
                    box-shadow: 0 0 0 0 rgba(239, 68, 68, 0);
                }
            }
            
            /* 绿色对钩动画样式 */
            .animate-green-check {
                animation: greenCheckEffect 1.5s ease-out forwards;
            }
            
            @keyframes greenCheckEffect {
                0% {
                    transform: scale(0) rotate(-30deg);
                    opacity: 0;
                }
                20% {
                    transform: scale(1.2) rotate(10deg);
                    opacity: 1;
                }
                40% {
                    transform: scale(1) rotate(-5deg);
                    opacity: 1;
                }
                60% {
                    transform: scale(1.1) rotate(5deg);
                    opacity: 1;
                }
                80% {
                    transform: scale(1) rotate(0deg);
                    opacity: 1;
                }
                100% {
                    transform: scale(1.2) rotate(0deg);
                    opacity: 0;
                }
            }
            
            .animate-green-check-pulse {
                animation: greenCheckPulse 0.6s ease-out;
            }
            
            @keyframes greenCheckPulse {
                0% {
                    transform: scale(1);
                    box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7);
                }
                70% {
                    transform: scale(1.05);
                    box-shadow: 0 0 0 10px rgba(34, 197, 94, 0);
                }
                100% {
                    transform: scale(1);
                    box-shadow: 0 0 0 0 rgba(34, 197, 94, 0);
                }
            }
            
            /* 庆祝文字浮动动画 */
            @keyframes celebrateText {
                0% {
                    transform: translateY(0) scale(1);
                    opacity: 0;
                }
                20% {
                    transform: translateY(-20px) scale(1.2);
                    opacity: 1;
                }
                80% {
                    transform: translateY(-80px) scale(1.1);
                    opacity: 0.8;
                }
                100% {
                    transform: translateY(-120px) scale(0.8);
                    opacity: 0;
                }
            }
            
            /* 反馈区域自动换行样式 */
            #feedback {
                word-wrap: break-word;
                word-break: break-all;
                white-space: normal;
                overflow-wrap: break-word;
                margin-top: -0.5rem;
                margin-bottom: 2.5rem;
            }
            
            /* 勋章容器响应式样式 */
            @media (max-width: 640px) {
                #badge-collapsed {
                    display: flex !important;
                }
                #badge-container {
                    display: none !important;
                    position: absolute;
                    top: 100%;
                    left: 50%;
                    transform: translateX(-50%);
                    background: white;
                    border: 1px solid #e5e7eb;
                    border-radius: 8px;
                    padding: 8px;
                    box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
                    z-index: 50;
                    width: 50px; /* 适当宽度显示勋章 */
                }
                #badge-container.expanded {
                    display: flex !important;
                    flex-direction: column;
                    gap: 8px;
                    align-items: center;
                }
            }
            
            /* 大屏幕也使用勋字折叠显示 */
            @media (min-width: 641px) {
                #badge-collapsed {
                    display: flex !important;
                }
                #badge-container {
                    display: none !important;
                    position: absolute;
                    top: 100%;
                    left: 50%;
                    transform: translateX(-50%);
                    background: white;
                    border: 1px solid #e5e7eb;
                    border-radius: 8px;
                    padding: 8px;
                    box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
                    z-index: 50;
                    width: 50px; /* 适当宽度显示勋章 */
                }
                #badge-container.expanded {
                    display: flex !important;
                    flex-direction: column;
                    gap: 8px;
                    align-items: center;
                }
            }
            
            /* 经验值进度条融合样式 */
            .relative.w-16.h-4 {
                position: relative;
                border-radius: 8px;
                box-shadow: inset 0 1px 2px rgba(0, 0, 0, 0.2);
                width: 48px; /* 减少宽度减少间距 */
                margin: 0 2px; /* 减少左右margin */
            }
            
            .relative.w-16.h-4 #xp {
                font-size: 8px;
                font-weight: bold;
                text-shadow: 0 1px 1px rgba(0, 0, 0, 0.3);
                pointer-events: none;
                z-index: 2;
            }
            
            .relative.w-16.h-4 #xp-bar {
                z-index: 1;
                border-radius: 8px;
            }
            
            /* 小屏幕时调整融合进度条 */
            @media (max-width: 480px) {
                .flex.items-center.space-x-2 {
                    flex-direction: row;
                    align-items: center;
                    gap: 2px; /* 减少间距 */
                }
                .relative.w-16.h-4 {
                    width: 40px; /* 进一步减少宽度 */
                    height: 16px;
                    margin: 0 1px; /* 进一步减少margin */
                }
                .relative.w-16.h-4 #xp {
                    font-size: 7px;
                }
            }
        }
    </style>
</head>

            <!-- 音量设置 -->
            <button id="volume-panel-btn" class="w-full flex items-center justify-start p-3 bg-gradient-to-r from-green-50 to-green-100 hover:from-green-100 hover:to-green-200 rounded-lg text-xs transition-all duration-200 hover:scale-105 hover:shadow-md border border-green-100/50">
                <i class="fas fa-volume-up text-green-600 w-4 h-4 mr-2 flex items-center justify-center"></i>
                <span class="text-gray-800 text-xs font-medium">音量设置</span>
            </button>
            
            <!-- 学习社区 -->
            <button id="community-panel-btn" class="w-full flex items-center justify-start p-3 bg-gradient-to-r from-orange-50 to-orange-100 hover:from-orange-100 hover:to-orange-200 rounded-lg text-xs transition-all duration-200 hover:scale-105 hover:shadow-md border border-orange-100/50">
                <i class="fas fa-users text-orange-600 w-4 h-4 mr-2 flex items-center justify-center"></i>
                <span class="text-gray-800 text-xs font-medium">学习社区</span>
            </button>
        </div>
    </div>
    
    <!-- 提示弹窗 -->
    <div id="hint-modal" class="fixed inset-0 bg-black/80 flex items-center justify-center z-10 hidden">
        <div class="bg-gradient-to-br from-gray-900 via-red-900 to-black rounded-lg shadow-2xl max-w-2xl w-full mx-4 max-h-[60vh] flex flex-col border-2 border-red-600">
            <div class="p-4 border-b border-red-800 bg-red-900/30">
                <h3 class="text-lg font-bold text-red-400 text-shadow">⚠️ 警告提示</h3>
            </div>
            <div class="flex-1 overflow-y-auto p-4 bg-gray-900/50">
                <p class="text-sm text-red-200 whitespace-pre-wrap break-words font-mono" id="hint-text"></p>
            </div>
            <div class="p-4 border-t border-red-800 bg-red-900/30">
                <button id="close-hint" class="w-full py-2 bg-red-700 hover:bg-red-800 text-white rounded text-sm font-bold transition-all duration-300 border border-red-500 hover:border-red-400 hover:scale-105">
                    ❌ 关闭警告
                </button>
            </div>
        </div>
    </div>

    <!-- 答案弹窗 -->
    <div id="answer-modal" class="fixed inset-0 bg-black/90 flex items-center justify-center z-10 hidden">
        <div class="bg-gradient-to-br from-purple-900 via-gray-900 to-black rounded-lg shadow-2xl max-w-2xl w-full mx-4 max-h-[80vh] flex flex-col border-2 border-purple-600">
            <div class="p-4 border-b border-purple-800 bg-purple-900/30">
                <h3 class="text-lg font-bold text-purple-300 text-shadow">💀 最终答案</h3>
            </div>
            <div class="flex-1 overflow-y-auto p-4 bg-gray-900/50">
                <p class="text-sm text-purple-200 whitespace-pre-wrap break-words font-mono" id="answer-text"></p>
            </div>
            <div class="p-4 border-t border-purple-800 bg-purple-900/30">
                <button id="close-answer" class="w-full py-2 bg-purple-700 hover:bg-purple-800 text-white rounded text-sm font-bold transition-all duration-300 border border-purple-500 hover:border-purple-400 hover:scale-105">
                    💀 接受命运
                </button>
            </div>
        </div>
    </div>

    <!-- 粒子动画容器 -->
    <div id="particles-container" class="fixed inset-0 pointer-events-none z-0 select-none"></div>

    <!-- 加油动画容器 -->
    <div id="cheer-animation" class="fixed inset-0 flex items-center justify-center pointer-events-none z-20 hidden select-none">
        <div class="text-center select-none">
            <div class="text-6xl text-yellow-500 mb-4 select-none">🔥</div>
            <div class="text-2xl font-bold text-yellow-600 animate-pulse-slow select-none">加油！继续努力！</div>
        </div>
    </div>
    
    <!-- 波特兰枫树容器 -->

        <canvas id="maple-tree-canvas" class="max-w-[90%] max-h-[250px] opacity-90 rounded-lg shadow-lg"></canvas>
    </div> -->
</body>
</html>
